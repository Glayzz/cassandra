# fly.toml - Fly.io deploy config
# Deploy: fly launch (first time) -> fly deploy
# Set secrets: fly secrets set ETHERSCAN_API_KEY=... ALCHEMY_API_KEY=... ANTHROPIC_API_KEY=...

app = "cassandra-oracle"
primary_region = "iad"  # US East. Pick "hkg" (Hong Kong) for OKX audience per docs.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  LOG_LEVEL = "info"
  DEFAULT_CHAIN_ID = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1  # keep one warm for MCP handshake latency
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
