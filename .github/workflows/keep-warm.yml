name: keep-warm

# Keeps the Render free-tier instance awake. Render free web services spin down
# after ~15 min of inactivity, and the first request after that takes 30-60s+ to
# wake — which is what timed out OKX's listing test. Pinging /health on a short
# interval keeps the container warm so the endpoint is always reachable.
#
# Notes:
# - GitHub schedules are best-effort and can be delayed several minutes under
#   load, so we ping every 10 min (comfortably under the ~15 min idle timeout).
# - GitHub disables scheduled workflows after 60 days with no repo commits.
# - Scheduled workflows only run on the default branch (main).

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (wake + verify)
        run: |
          URL="https://cassandra-oracle.onrender.com/health"
          for i in 1 2 3 4; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i: GET $URL -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "service is awake"
              exit 0
            fi
            sleep 20
          done
          echo "::error::/health did not return 200 after retries — service may be down"
          exit 1
